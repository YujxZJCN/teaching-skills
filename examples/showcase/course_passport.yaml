# Course Passport — CS 304 Introduction to Machine Learning (SHOWCASE)
# Demonstration artifact: hypothetical course, synthetic data, no real students.
# Schema: shared/course_passport_schema.md (passport_version 1.0)

passport_version: "1.0"
course:
  code: "CS 304"
  title: "Introduction to Machine Learning"
  discipline: "Computer Science"
  level: "undergraduate-3rd-year"
  credits: 3
  modality: "in-person"
  class_size: 90
  contact_hours_per_week: 3          # one 90-min lecture + one 90-min lab session per week
  weeks: 16
  language_of_instruction: "English"
  prerequisites: ["CS 201 Data Structures", "MATH 210 Linear Algebra", "STAT 110 Probability"]
  institution_constraints:
    - "English-medium instruction (EMI) at a Chinese university — all materials and assessments in English"

term_calendar:
  start_date: "2026-09-07"
  end_date: "2026-12-25"
