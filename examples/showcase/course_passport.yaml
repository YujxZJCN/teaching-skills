policies:
  grading_scheme: >-
    Final grade = weighted sum per assessment plan (quizzes: best 8 of 10 counted).
    No curve. Letter cutoffs: A >= 90, B 80-89, C 70-79, D 60-69, F < 60.
  late_policy: >-
    Labs and project milestones: 3 free late days pooled across the term (max 2 on
    one artifact); afterwards -10% per day, up to 3 days, then not accepted.
    Quizzes: no make-ups — best-8-of-10 absorbs absences. Exams: make-ups only for
    documented emergencies, arranged with the instructor in advance where possible.
  ai_use_policy: >-
    Three-tier per-assessment policy (shared/ai_era_integrity.md): Tier P for
    A1/A3/A5/A6 — these measure unaided fluency; Tier D for A2/A4 — professional-
    practice tools permitted with a graded disclosure appendix. Full table with
    per-tier rationales in syllabus.md, section "AI use in this course".
  integrity_policy: "[NEEDS PROFESSOR INPUT: institutional academic integrity policy link — faculty handbook §academic-conduct]"
  attendance_policy: >-
    Attendance is not directly graded. Lab sessions are where quizzes run and
    project clinics happen — missing them costs opportunities, not points.
    Peer-instruction votes are never graded for correctness.

workload_audit:
  estimated_hours_per_week: 6.2
  credit_hour_target: 6.0             # 2 out-of-class hours per contact hour × 3
  status: within_range
  constants_used: >-
    reading 20 pp/wk × ~450 words/p ÷ 100 wpm (dense technical) = 1.5 h; labs
    4 × (4 h professor estimate × 3 novice multiplier) ÷ 16 wk = 3.0 h; project
    22 h team-share estimate ÷ 16 wk ≈ 1.4 h; quiz prep 10 × 0.5 h ÷ 16 wk ≈ 0.3 h.
    Exam preparation treated as redistributed study time, not added. Full
    arithmetic in alignment_report.md (check D1/D2).

gates:
  alignment_gate:
    status: pass
    last_run: "2026-06-10"
    findings:
      - check_id: C2
        severity: WARN
        detail: >-
          A4 course project weight 30% is within the 40% single-assessment limit,
          but A4 (final report M3 due W14) and A6 (final exam, W16) together
          resolve 45% of the grade in the final six weeks of the term.
        affected_ids: [A4, A6]
        dismissed: >-
          deliberate — A4's staged milestones move 12 of its 30 points and the
          bulk of the project work outside the final six weeks (M1 W6 4%, M2 W10
          8%); only the final report (18%) plus A6 (15%) genuinely lands late.
      - check_id: B3
        severity: WARN
        detail: >-
          Bloom distribution sanity: LO6 (create) is the sole create-level outcome
          and is evidenced only by A4/A5; if a team's project collapses, no other
          instrument shows create-level work.
        affected_ids: [LO6, A4, A5]
        dismissed: >-
          acknowledged — one create-level outcome is the intended scope for a
          first ML course; team-collapse risk is mitigated by milestone feedback
          at W6 and W10.
  quality_gate:
    status: pass
    last_run: "2026-06-10"
    findings: []

