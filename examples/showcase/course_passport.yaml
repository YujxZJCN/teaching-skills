    - { date: "2026-10-01..2026-10-07", name: "National Day holiday (no class)" }
  exam_weeks: [W8, W16]
  add_drop_deadline: "[NEEDS PROFESSOR INPUT: registrar add/drop deadline]"
  withdrawal_deadline: "[NEEDS PROFESSOR INPUT: registrar withdrawal deadline]"

learner_profile:
  prior_knowledge: >-
    Strong programmers (CS 201; most fluent in Python). Linear algebra (MATH 210)
    and probability (STAT 110) formally completed, but probability preparation is
    mixed and linear algebra is rusty for many — the W1 lab runs a refresher.
  motivation_context: >-
    Required core for the 3rd-year CS cohort; strong interest in ML engineering
    roles and graduate study (professor's report — not surveyed).
  known_difficulties:
    - "Confusing training error with test error — treating low training error as model quality"
    - "Treating ML as API-calling: using library models without understanding their assumptions"
    - "Linear algebra rust: matrix calculus and decompositions need re-activation"
  accessibility_needs: "unknown"

learning_outcomes:
  - id: LO1
    statement: "Explain the assumptions, inductive biases, and characteristic failure modes of core supervised and unsupervised learning algorithms"
    bloom_level: understand
    assessed_by: [A1, A3, A6]
    taught_in: [W1, W2, W3, W4, W6, W9, W10, W11, W13]
  - id: LO2
    statement: "Implement linear models, tree ensembles, and neural networks from their mathematical specifications using NumPy and scikit-learn/PyTorch"
    bloom_level: apply
    assessed_by: [A2, A3, A6]
    taught_in: [W3, W4, W9, W11, W12]
  - id: LO3
    statement: "Apply correct experimental methodology — train/validation/test splits, cross-validation, and hyperparameter search — to fit and tune models on real datasets"
    bloom_level: apply
    assessed_by: [A1, A2, A3]
    taught_in: [W2, W5, W7]
  - id: LO4
    statement: "Diagnose model failures by analyzing learning curves, bias-variance behavior, and error patterns, and select justified corrective actions"
    bloom_level: analyze
    assessed_by: [A2, A3, A4]
    taught_in: [W5, W6, W7, W12]
  - id: LO5
    statement: "Evaluate the suitability and limits of a trained model for a stated task, including metric choice, data-leakage risks, and ethical considerations"
    bloom_level: evaluate
    assessed_by: [A4, A5, A6]
    taught_in: [W5, W14]
  - id: LO6
    statement: "Design and carry out an end-to-end machine learning project, from problem formulation through data preparation, modeling, evaluation, and written report"
    bloom_level: create
    assessed_by: [A4, A5]
    taught_in: [W5, W7, W10, W14]

assessment_plan:
  - id: A1                            # Tier P — measures unaided fluency
    type: quiz
    title: "Weekly Quizzes (best 8 of 10)"
    weight: 10
    outcomes_assessed: [LO1, LO3]
    week: "W2-W13 (10 quizzes at lab start; none in W8 or W10)"
    ai_resilience: reviewed           # in-lab, paper, devices away — low vulnerability
    artifact_ref: null
  - id: A2                            # Tier D — professional-practice tools with disclosure
    type: homework
    title: "Lab Assignments (4)"
    weight: 20
    outcomes_assessed: [LO2, LO3, LO4]
    week: "W5 / W7 / W11 / W13 (due dates; each assigned ~2 weeks prior)"
    ai_resilience: reviewed           # accepted risk — see integrity_audit.md (disclosure appendix graded)
    artifact_ref: null
  - id: A3                            # Tier P — measures unaided fluency
    type: exam
    title: "Midterm Exam (in-class, closed-book)"
    weight: 25
    outcomes_assessed: [LO1, LO2, LO3, LO4]
    week: W8
    ai_resilience: reviewed
    artifact_ref: "exam_blueprint_midterm.md"
  - id: A4                            # Tier D — process-evidence design
    type: project
    title: "Course Project (staged: M1 proposal 4% W6 · M2 progress 8% W10 · M3 final report 18% W14)"
    weight: 30
    outcomes_assessed: [LO4, LO5, LO6]
    week: "W6 / W10 / W14 (milestones)"
    ai_resilience: redesigned         # was a single-deadline take-home; redesigned to staged milestones
                                      # with feedback-response notes + sampled defenses — integrity_audit.md
    artifact_ref: null
  - id: A5                            # Tier P — live oral, unaided
    type: presentation
    title: "Project Defense (sampled 5-min oral check; required completion gate for A4 M3)"
    weight: 0
    outcomes_assessed: [LO5, LO6]
    week: W15
    ai_resilience: reviewed
    artifact_ref: null
  - id: A6                            # Tier P — measures unaided fluency
    type: exam
    title: "Final Exam (cumulative, emphasis W9-W14)"
    weight: 15
    outcomes_assessed: [LO1, LO2, LO5]
    week: W16
    ai_resilience: reviewed
    artifact_ref: null
# Weights: 10 + 20 + 25 + 30 + 0 + 15 = 100

