# Course Passport — HIST 247 The Atlantic World, 1500–1800 (SHOWCASE — SEMINAR)
# Demonstration artifact: hypothetical course, synthetic data, no real students.
# Schema: shared/course_passport_schema.md (passport_version 1.0)
# Companion to examples/showcase/ (a 90-person STEM course). This one is a small
# humanities seminar, chosen to exercise the discussion/writing-based design path and
# the person-affecting skills. NO student-identifying data appears anywhere here —
# the recommendation letter, intake record, and feedback report are standalone files,
# deliberately NOT listed in artifacts[] (they carry student content).

passport_version: "1.0"
course:
  code: "HIST 247"
  title: "The Atlantic World, 1500–1800"
  discipline: "History"
  level: "undergraduate-seminar"
  credits: 3
  modality: "in-person"
  class_size: 18
  contact_hours_per_week: 2.5         # one 150-minute weekly seminar
  weeks: 15
  language_of_instruction: "English"
  prerequisites: ["one prior history course"]
  institution_constraints:
    - "Discussion- and writing-intensive seminar; enrollment capped at 18 by department policy"

term_calendar:
  start_date: "2026-09-08"
  end_date: "2026-12-15"
  holidays:
    - { date: "2026-11-26", name: "Thanksgiving recess (no seminar)" }
  exam_weeks: [W15]                    # no sit-down exam; W15 is the synthesis/submission week
  add_drop_deadline: "[NEEDS PROFESSOR INPUT: registrar add/drop deadline]"
  withdrawal_deadline: "[NEEDS PROFESSOR INPUT: registrar withdrawal deadline]"

learner_profile:
  prior_knowledge: >-
    History and area-studies majors who have completed at least one prior history
    course. Strong readers with solid general historical literacy. Primary-source
    analysis experience is mixed — some have done a methods course, others have only
    read sources as illustration rather than as evidence to be interrogated.
  motivation_context: >-
    A topical seminar that most students elect toward the major; many intend graduate
    study or careers in archives, museums, law, and teaching (professor's report — not
    surveyed).
  known_difficulties:
    - "Presentism — judging past actors and institutions by present-day values rather than reconstructing their context"
    - "Confusing summary with argument — restating what a source says instead of advancing a claim about it"
    - "Weak source contextualization — reading a document without establishing its provenance, audience, and purpose"
  accessibility_needs: "unknown"
  cohort_evidence: null               # no diagnostic run for this showcase; aggregates only when present

learning_outcomes:
  - id: LO1
    statement: "Explain the principal systems, actors, and chronology of the Atlantic world, 1500–1800 — empires, the slave trade and slavery, commodity and migration flows, and exchanges among European, African, and Indigenous American societies"
    bloom_level: understand
    assessed_by: [A2, A5]
    taught_in: [W1, W2, W3, W4, W5, W7, W9]
  - id: LO2
    statement: "Apply primary-source analysis methods — establishing provenance, audience, purpose, and genre — to interpret an individual document as historical evidence"
    bloom_level: apply
    assessed_by: [A3]
    taught_in: [W2, W3, W6]
  - id: LO3
    statement: "Analyze a historiographical argument: distinguish an author's claim, evidence, and warrant from mere summary, and locate the argument within a scholarly debate"
    bloom_level: analyze
    assessed_by: [A1, A2, A4]
    taught_in: [W2, W4, W5, W9, W10, W11]
  - id: LO4
    statement: "Evaluate competing historical interpretations on their evidentiary and contextual merits, resisting presentism and weighing the limits of the available sources"
    bloom_level: evaluate
    assessed_by: [A1, A3, A4, A5]
    taught_in: [W3, W5, W7, W10, W13, W14]
  - id: LO5
    statement: "Create an original, archivally grounded research essay that poses a historical question, builds an argument from primary sources, and situates it in the secondary literature"
    bloom_level: create
    assessed_by: [A4]
    taught_in: [W7, W8, W12, W14]

assessment_plan:
  - id: A1                            # Tier P — in-class, unaided, live
    type: participation
    title: "Seminar participation & discussion leadership"
    weight: 15
    outcomes_assessed: [LO3, LO4]
    week: "W2-W14 (ongoing; each student co-leads one seminar)"
    ai_resilience: reviewed           # in-person discussion — not AI-vulnerable by construction
    artifact_ref: null
  - id: A2                            # Tier D — short writing, tools-with-disclosure, spec-graded
    type: homework
    title: "Reading responses (6 assigned, best 5 counted)"
    weight: 15
    outcomes_assessed: [LO1, LO3]
    week: "W2 / W3 / W5 / W7 / W9 / W11 (best 5 of 6)"
    ai_resilience: reviewed           # specs-flavored pass/revise; low individual stakes, disclosure required
    artifact_ref: null
  - id: A3                            # Tier D — single-document analysis with disclosure
    type: paper
    title: "Primary-source analysis paper (1 document, ~1500 words)"
    weight: 20
    outcomes_assessed: [LO2, LO4]
    week: W6
    ai_resilience: reviewed
    artifact_ref: null
  - id: A4                            # Tier D — staged process-evidence design
    type: project
    title: "Research essay (staged: proposal W8 7% · draft W12 8% · final W15 20%)"
    weight: 35
    outcomes_assessed: [LO3, LO4, LO5]
    week: "W8 / W12 / W15 (milestones)"
    ai_resilience: redesigned         # was a single end-of-term essay; redesigned to staged milestones
                                      # (proposal + reviewed draft + final) with a revision memo at each
                                      # stage so the process is the evidence — see research_essay_brief.md
    artifact_ref: "research_essay_brief.md"
  - id: A5                            # Tier O — AI-collaboration-aware take-home synthesis
    type: paper
    title: "Take-home synthesis essay (final, AI-collaboration-aware)"
    weight: 15
    outcomes_assessed: [LO1, LO4]
    week: W15
    ai_resilience: reviewed           # Tier O by design — graded on judgment over and beyond tool output
    artifact_ref: null
# Weights: 15 + 15 + 20 + 35 + 15 = 100

