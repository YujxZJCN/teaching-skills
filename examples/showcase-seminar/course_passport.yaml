iteration_history:
  - term: "2025 Fall"
    changes:
      - "Replaced the single end-of-term research essay (one W15 deadline) with staged milestones — proposal W8, reviewed draft W12, final W15 — each carrying a short revision memo, and split the weight (7% / 8% / 20%) so the process is the graded evidence (now A4)"
      - "Introduced the specs-flavored pass/revise scheme for reading responses (A2) with a one-time resubmission, to move students off summary and toward argument earlier"
    evidence: >-
      teaching-reflector eval-analysis recurring theme that the research essay "came down
