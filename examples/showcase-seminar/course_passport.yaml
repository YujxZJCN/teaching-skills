policies:
  grading_scheme: >-
    Final grade = weighted sum per the assessment plan. Reading responses (A2) use a
    lightly specs-flavored scheme: each response is marked pass / revise against a posted
    spec (a defensible claim, at least one source read as evidence not illustration, and
    contextualization of that source); a "revise" may be resubmitted once within one week
    and, if it then meets the spec, counts as a pass. The best 5 of 6 passes count. All
    other assessments are graded on their rubrics. No curve. Letter cutoffs: A >= 93,
    A- 90-92, B+ 87-89, B 83-86, B- 80-82, C+ 77-79, C 70-76, D 60-69, F < 60.
  late_policy: >-
    Research-essay milestones (A4) and the primary-source paper (A3): 3 free late days
    pooled across the term (max 2 on one artifact); afterwards -1/3 letter grade per day,
    up to 3 days, then not accepted. Reading responses (A2): no make-ups — best-5-of-6
    absorbs absences, and the revise option absorbs a weak attempt. The take-home
    synthesis (A5) has a fixed submission window and is not eligible for late days.
  ai_use_policy: >-
    Per-assessment tiers (shared/ai_era_integrity.md). Tier P: A1 seminar participation
    and discussion leadership — live, in-person, unaided by construction. Tier D: A2
    reading responses, A3 primary-source paper, A4 research essay — generative AI permitted
    as a tool with a short disclosure (which tool, what you asked, what you changed);
    disclosure is never penalized, non-disclosure where required is an integrity matter.
    Tier O: A5 take-home synthesis essay — AI collaboration is expected; you are graded on
    judgment over the tool's output (verification, selection, and what you add beyond it),
    with a required process note. Full table with rationales in syllabus.md.
  integrity_policy: "[NEEDS PROFESSOR INPUT: institutional academic integrity policy link — faculty handbook §academic-conduct]"
  attendance_policy: >-
    A discussion seminar depends on presence: regular attendance and prepared
    participation are expected, and discussion leadership (A1) requires it. More than two
    unexcused absences should be discussed with the instructor. Participation is assessed
    on the quality of engagement with the readings and peers, never on volume of talk or
    on agreement with the instructor.

workload_audit:
  estimated_hours_per_week: 6.3
  credit_hour_target: 5.0             # 2 out-of-class hours per contact hour × 2.5 contact hours
  status: within_range
  constants_used: >-
    Reading ~70 pp/wk of mixed primary + secondary sources × ~400 words/p ÷ 130 wpm
    (read-to-discuss, annotating) ≈ 3.6 h; reading responses 6 × ~2.5 h ÷ 15 wk ≈ 1.0 h;
    primary-source paper ~9 h ÷ 15 wk ≈ 0.6 h; research essay ~16 h team-of-one estimate
    (proposal + draft + final + revision memos) ÷ 15 wk ≈ 1.1 h. Take-home synthesis
    treated as redistributed end-of-term study time, not added. Full arithmetic in
    alignment_report.md (check D1/D2). Estimate 6.3 vs target 5.0 is +26% — just over the
    ±25% band; recorded as a deliberate, professor-acknowledged design choice (see gate
    finding D2), not a defect, given a reading-intensive upper-level seminar.

gates:
  alignment_gate:
    status: pass
    last_run: "2026-06-15"
    findings:
      - check_id: C3
        severity: WARN
        detail: >-
          No assessment carries a low-stakes weight (<= 10%); the first high-stakes
          assessment (A3 primary-source paper, 20%, due W6) is not preceded by a formally
          low-stakes one. Affected: none cited (course-level structural note).
        affected_ids: []
        dismissed: >-
          deliberate — the reading responses (A2, 15%) are the calibration instrument: low
          individual stakes (best 5 of 6, ~3% each), specs-graded pass/revise with a free
          resubmission, and they begin W2, four weeks before the first paper. They do the
          job a sub-10% assessment would, so the threshold flag does not apply here.
      - check_id: D2
        severity: WARN
        detail: >-
          Estimated out-of-class workload 6.3 h/wk vs credit-hour target 5.0 h/wk is +26%,
          just outside the ±25% tolerance — driven by ~70 pp/wk of seminar reading.
        affected_ids: []
        dismissed: >-
          acknowledged — a reading-intensive upper-level seminar runs deliberately above
          the generic credit-hour convention; the professor accepts the reading load as
          core to the course and will signal it plainly in the syllabus. Recorded, not
          re-raised.
      - check_id: D3
        severity: WARN
        detail: >-
          W15 lists two major deliverables: A4 (research essay final, 20%) and A5
          (take-home synthesis essay, 15%). Affected: A4, A5, W15.
        affected_ids: [A4, A5, W15]
        note: >-
          left live and recorded (not dismissed). The professor confirmed the staging is
          intentional: the research essay is due at the start of the final week, while the
          synthesis is a take-home released that week with a submission window into the
          exam period, so the two do not in practice land on one day. Kept visible so the
          delivery sequencing is checked at publication.
  quality_gate:
    status: pass
    last_run: "2026-06-15"
    findings: []

